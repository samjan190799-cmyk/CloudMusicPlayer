name: CloudMusicPlayer
options:
  bundleIdPrefix: com.samvel.cloudmusicplayer
targets:
  CloudMusicPlayer:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleName: CloudMusicPlayer
        CFBundleDisplayName: CloudMusicPlayer
        CFBundleIdentifier: com.samvel.cloudmusicplayer
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: CloudMusicPlayer
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleIconName: AppIcon
    settings:
      base:
        SWIFT_VERSION: "5.9"
        ALWAYS_SEARCH_USER_PATHS: "NO"
        PRODUCT_NAME: CloudMusicPlayer
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_PRIMARY_APPICON_SET_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: "YES"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        GENERATE_INFOPLIST_FILE: "NO"
