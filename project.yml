name: CloudMusicPlayer
options:
  bundleIdPrefix: com.samvel.cloudmusicplayer
packages:
  YouTubeKit:
    url: https://github.com/alexeichhorn/YouTubeKit
    from: "0.3.0"
targets:
  CloudMusicPlayer:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
        excludes:
          - Widget/PlayerWidget.swift
          - Widget/PlayerWidgetIntents.swift
          - Widget/Info.plist
    dependencies:
      - package: YouTubeKit
      - target: CloudMusicPlayerWidget
        embed: true
        link: false
    info:
      path: Sources/Info.plist
      properties:
        CFBundleName: CloudMusicPlayer
        CFBundleDisplayName: CloudMusicPlayer
        CFBundleIdentifier: com.samvel.cloudmusicplayer
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: CloudMusicPlayer
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleIconName: AppIcon
    settings:
      base:
        SWIFT_VERSION: "5.9"
        ALWAYS_SEARCH_USER_PATHS: "NO"
        PRODUCT_NAME: CloudMusicPlayer
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_PRIMARY_APPICON_SET_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: "YES"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        GENERATE_INFOPLIST_FILE: "NO"

  CloudMusicPlayerWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources/Widget
    info:
      path: Sources/Widget/Info.plist
      properties:
        CFBundleName: CloudMusicPlayerWidget
        CFBundleDisplayName: Player Widget
        CFBundleIdentifier: com.samvel.cloudmusicplayer.widget
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: "XPC!"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.samvel.cloudmusicplayer.widget
        PRODUCT_NAME: CloudMusicPlayerWidget
        SKIP_INSTALL: "YES"
        APPLICATION_EXTENSION_API_ONLY: "YES"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        GENERATE_INFOPLIST_FILE: "NO"
