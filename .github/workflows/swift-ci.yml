name: iOS Swift CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    - name: Select Latest Xcode
      run: |
        LATEST_XCODE=$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)
        echo "Using: $LATEST_XCODE"
        sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
        xcodebuild -version
    - name: Build Package
      run: xcodebuild build -scheme CloudMusicPlayer -destination 'generic/platform=iOS' -configuration Release CODE_SIGNING_ALLOWED=NO


